    EsgSummaryReport:
      type: object
      properties:
        generatedAt: { type: string, format: date-time }
        period: { $ref: "#/components/schemas/ReportPeriod" }
        overallScore: { type: number }
        environmentalScore: { type: number }
        socialScore: { type: number }
        governanceScore: { type: number }
        departmentRankings: { type: array, items: { $ref: "#/components/schemas/DepartmentRanking" } }
